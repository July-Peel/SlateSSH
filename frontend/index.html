<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <title>SlateSSH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/css/app.css?v=20260611_winui_mobile">
</head>
<body>
  <div id="app" x-data="shadowApp()" x-init="init()" :class="theme === 'dark' ? 'app theme-dark' : 'app theme-light'">
    <template x-if="booting">
      <div class="auth-page"><div class="boot-brand">SlateSSH</div></div>
    </template>

    <template x-if="!booting && needsSetup">
      <div class="auth-page">
        <form @submit.prevent="setup()" class="auth-card">
          <h1>初始化管理员</h1>
          <input x-model="setupForm.username" autocomplete="username" placeholder="用户名">
          <input x-model="setupForm.password" type="password" autocomplete="new-password" placeholder="密码">
          <input x-model="setupForm.confirmPassword" type="password" autocomplete="new-password" placeholder="确认密码">
          <p class="message error" x-text="error"></p>
          <button class="primary">初始化</button>
        </form>
      </div>
    </template>

    <template x-if="!booting && !needsSetup && !authenticated">
      <div class="auth-page">
        <form @submit.prevent="login()" class="auth-card">
          <h1>SlateSSH</h1>
          <input x-model="loginForm.username" autocomplete="username" placeholder="用户名">
          <input x-model="loginForm.password" type="password" autocomplete="current-password" placeholder="密码">
          <label class="check-row"><input type="checkbox" x-model="loginForm.rememberMe">记住我</label>
          <p class="message error" x-text="error"></p>
          <button class="primary">登录</button>
        </form>
      </div>
    </template>

    <template x-if="!booting && authenticated">
      <div class="workspace">
        <header class="topbar">
          <div class="topbar-actions" style="justify-content: flex-start; flex: 1;">
            <button @click="isMobile ? showMobileMenu = !showMobileMenu : showSidebar = !showSidebar" class="icon-btn topbar-shortcut"><span class="material-symbols-rounded">menu</span></button>
            <div class="window-icon" style="margin-left: 4px; color: var(--accent);"><span class="material-symbols-rounded" style="font-size: 20px;">dock_to_right</span></div>
            <div class="brand" style="margin-left: 6px;">SlateSSH</div>
          </div>
          <div class="topbar-actions">
            <button @click="showConnectionManager = true" class="topbar-shortcut" style="display:none;"><span class="material-symbols-rounded" style="font-size:18px;">dns</span></button>
            <div class="user-avatar" x-text="(currentUser?.username || '?')[0]" style="display:none;"></div>
          </div>
        </header>

        <div class="drawer-overlay" x-show="isMobile && (showMobileMenu || showMobileSftp || showMobileStatus)" @click="showMobileMenu = false; showMobileSftp = false; showMobileStatus = false"></div>

        <main class="main-grid" :style="`grid-template-columns: ${isMobile ? '1fr' : ((showSidebar ? '300px ' : '') + 'minmax(0, 1fr) ' + ((showSftpWidget || showStatusWidget) ? '340px' : ''))}`">
          
          <aside class="connection-panel" x-show="isMobile ? showMobileMenu : showSidebar" :class="isMobile ? (showMobileMenu ? 'mobile-drawer left open' : 'mobile-drawer left') : ''">
            <div class="panel-head connection-panel-head" style="margin-bottom: 12px;">
              <h2 style="font-size: 18px; font-weight: 500;">SSH 连接</h2>
              <button class="icon-btn panel-add-btn" @click="newConnection()" title="新建连接"><span class="material-symbols-rounded">add</span></button>
              <div class="path-input-wrapper" style="margin-top: 12px; position: relative;">
                <input x-model="commandInput" placeholder="快速连接 user@host:port" class="path-input" @keydown.enter="sendCommandInput()">
                <button @click="sendCommandInput()" class="path-go-btn" title="连接" style="position: absolute; right: 4px;"><span class="material-symbols-rounded" style="font-size: 18px;">play_arrow</span></button>
              </div>
            </div>
            
            <div class="connection-list" style="overflow-y: auto; flex: 1; padding-bottom: 12px; margin: -8px; padding: 8px;">
              <template x-for="connection in connections" :key="connection.id">
                <div class="connection-item" :class="isConnectionActive(connection) ? 'active' : ''" @click="openSession(connection)">
                  <div class="connection-content">
                    <div class="item-main">
                      <span class="connection-state" :class="isConnectionActive(connection) ? 'online' : ''"></span>
                      <span class="material-symbols-rounded item-icon" x-text="(connection.type || 'SSH') === 'RDP' ? 'desktop_windows' : 'terminal'" style="font-size: 18px; color: var(--accent);"></span>
                      <span class="item-name" x-text="connection.name"></span>
                    </div>
                    <div class="item-sub">
                      <span class="type-badge" x-text="connection.type || 'SSH'"></span>
                      <span x-text="connection.username + '@' + connection.host.replace(/[0-9]/g, '*') + ':' + connection.port"></span>
                    </div>
                  </div>
                  <button class="icon-btn hide-icon" @click.stop="editConnection(connection); showConnectionManager = true;" title="编辑"><span class="material-symbols-rounded" style="font-size:16px;">edit</span></button>
                </div>
              </template>
              <div class="empty" x-show="!connections.length" style="padding-top: 24px;">暂无已保存的连接</div>
            </div>

            <div class="panel-footer command-strip" style="margin-top: auto; padding-top: 16px; display: flex; gap: 8px; align-items: center;">
              <button class="icon-btn" @click="newConnection()" title="新建连接"><span class="material-symbols-rounded" style="font-size: 18px;">add</span></button>
              <button class="icon-btn" @click="showConnectionManager = true" title="连接管理"><span class="material-symbols-rounded" style="font-size: 18px;">dns</span></button>
              <button class="icon-btn" @click="toggleTheme()" :title="theme === 'dark' ? '白天模式' : '夜间模式'"><span class="material-symbols-rounded" style="font-size: 18px;" x-text="theme === 'dark' ? 'light_mode' : 'dark_mode'"></span></button>
            </div>
          </aside>

          <section class="terminal-panel" :class="isFullscreen ? 'has-fullscreen' : ''">
            <div class="tabbar">
              <template x-for="tab in sessions" :key="tab.id">
                <div class="tab-wrapper" :class="activeSessionId === tab.id ? 'active' : ''">
                  <button @click="activateSession(tab.id)" class="tab" :class="activeSessionId === tab.id ? 'active' : ''">
                    <span class="material-symbols-rounded tab-icon" x-text="(tab.type || 'SSH') === 'RDP' ? 'desktop_windows' : 'terminal'" style="font-size: 14px; margin-right: 4px;"></span>
                    <span x-text="tab.name"></span>
                    <span class="tab-close" @click.stop="closeTab(tab.id)"><span class="material-symbols-rounded" style="font-size:14px;">close</span></span>
                  </button>
                </div>
              </template>
              <button class="tab-new" @click="showConnectionManager = true"><span class="material-symbols-rounded" style="font-size:18px;">add</span></button>
              <div class="tab-empty" x-show="!sessions.length" style="padding: 4px 12px;">暂无活动会话</div>
            </div>

            <div class="terminal-commandbar" x-show="activeSessionId">
              <button class="icon-btn" @click="copyTerminalSelection()" title="复制"><span class="material-symbols-rounded">content_copy</span></button>
              <button class="icon-btn" @click="mobileTerminalPaste()" title="粘贴"><span class="material-symbols-rounded">content_paste</span></button>
              <button class="icon-btn" @click="clearActiveTerminal()" title="清屏"><span class="material-symbols-rounded">mop</span></button>
              <div class="terminal-search-box">
                <span class="material-symbols-rounded">search</span>
                <input x-model="terminalSearch" @keydown.enter="searchTerminal()" placeholder="查找">
              </div>
              <button class="icon-btn" @click="findPreviousTerminalResult()" title="上一个"><span class="material-symbols-rounded">keyboard_arrow_up</span></button>
              <button class="icon-btn" @click="findNextTerminalResult()" title="下一个"><span class="material-symbols-rounded">keyboard_arrow_down</span></button>
            </div>

            <div class="terminal-stage" :class="isFullscreen ? 'fullscreen' : ''">
              <button x-show="activeSessionId" @click="toggleFullscreen()" class="terminal-fullscreen-btn" :title="isFullscreen ? '退出全屏' : '全屏'">
                <span class="material-symbols-rounded" x-text="isFullscreen ? 'fullscreen_exit' : 'fullscreen'"></span>
                <span class="terminal-fullscreen-label" x-text="isFullscreen ? '退出全屏' : '全屏'"></span>
              </button>
              <div x-show="terminalTouchMenu.visible" class="terminal-touch-menu" :style="`left:${terminalTouchMenu.x}px;top:${terminalTouchMenu.y}px`" @click.stop>
                <button @click="selectAllTerminalText()"><span class="material-symbols-rounded">select_all</span>全选</button>
                <button @click="startTerminalSelectionFromMenu()"><span class="material-symbols-rounded">text_fields</span>选择</button>
                <button @click="copyTerminalSelection()"><span class="material-symbols-rounded">content_copy</span>复制</button>
                <button @click="mobileTerminalPaste()"><span class="material-symbols-rounded">content_paste</span>粘贴</button>
                <button @click="clearActiveTerminal(); hideTerminalTouchMenu()"><span class="material-symbols-rounded">mop</span>清屏</button>
              </div>
              <div x-show="terminalSelection.active" class="terminal-selection-toolbar" :style="terminalSelectionToolbarStyle()" @click.stop>
                <button @click="copyTerminalSelection()"><span class="material-symbols-rounded">content_copy</span>复制</button>
                <button @click="clearTerminalSelection()"><span class="material-symbols-rounded">close</span>取消</button>
              </div>
              <button x-show="terminalSelection.active" class="terminal-selection-handle start" :style="terminalSelectionHandleStyle('start')" @pointerdown.prevent.stop="startTerminalSelectionHandleDrag($event, 'start')" aria-label="选择起点"></button>
              <button x-show="terminalSelection.active" class="terminal-selection-handle end" :style="terminalSelectionHandleStyle('end')" @pointerdown.prevent.stop="startTerminalSelectionHandleDrag($event, 'end')" aria-label="选择终点"></button>
              <div x-show="terminalPasteBox.visible" class="terminal-paste-popover" @click.stop>
                <textarea x-model="terminalPasteBox.text" placeholder="命令"></textarea>
                <div>
                  <button @click="terminalPasteBox.visible = false">取消</button>
                  <button class="primary" @click="sendTerminalPasteText()">发送</button>
                </div>
              </div>
              <template x-for="tab in sessions" :key="tab.id + '-terminal'">
                <div x-show="activeSessionId === tab.id" class="terminal-wrap">
                  <template x-if="tab.type === 'RDP'">
                    <div class="rdp-surface" :id="'rdp-' + tab.id"></div>
                  </template>
                  <template x-if="tab.type !== 'RDP'">
                    <div :id="'terminal-' + tab.id" class="terminal-surface"></div>
                  </template>
                </div>
              </template>
              <template x-if="!sessions.length">
                <div class="terminal-empty">
                  <span class="material-symbols-rounded empty-icon">terminal</span>
                  <div class="empty-text">点击右上角「连接」或右下角菜单，选择一个 SSH / RDP 连接开始</div>
                </div>
              </template>
            </div>

            <div class="terminal-mobile-bar" x-show="isMobile && activeSessionId">
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('copy')"><span class="material-symbols-rounded">content_copy</span></button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('paste')"><span class="material-symbols-rounded">content_paste</span></button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('ctrl')" :class="ctrlKeyActive ? 'active' : ''">Ctrl</button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('quick', '\x1b')">Esc</button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('quick', '\x09')">Tab</button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('quick', '\x1b[A')"><span class="material-symbols-rounded">keyboard_arrow_up</span></button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('quick', '\x1b[B')"><span class="material-symbols-rounded">keyboard_arrow_down</span></button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('quick', '\x1b[D')"><span class="material-symbols-rounded">keyboard_arrow_left</span></button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('quick', '\x1b[C')"><span class="material-symbols-rounded">keyboard_arrow_right</span></button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('quick', '/')">/</button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('quick', '-')">-</button>
              <button tabindex="-1" @pointerdown.prevent.stop="terminalMobileButton('quick', '|')">|</button>
            </div>
            
            <p class="status-line" style="display:none;" :class="testMessageType" x-text="testMessage"></p>
          </section>

          <aside class="side-panel" x-show="!isMobile ? (showSftpWidget || showStatusWidget) : true" :class="isMobile ? (showMobileStatus ? 'mobile-drawer right open' : 'mobile-drawer right') : ''">
            <div class="side-tabs top-icons">
              <button class="icon-btn" :class="rightTab === 'files' ? 'active' : ''" @click="rightTab = 'files'; showSftpWidget = true; showStatusWidget = false" title="文件"><span class="material-symbols-rounded">folder</span></button>
              <button class="icon-btn" :class="rightTab === 'status' ? 'active' : ''" @click="rightTab = 'status'; showStatusWidget = true; showSftpWidget = false" title="状态监控"><span class="material-symbols-rounded">speed</span></button>
              <div style="flex:1"></div>
              <button class="icon-btn" x-show="isMobile" @click="showMobileStatus = false"><span class="material-symbols-rounded">close</span></button>
            </div>

            <div x-show="rightTab === 'files'" style="display: flex; flex-direction: column; height: 100%;">
              <div class="panel-head" style="display:none;">
                <h2>SFTP 文件</h2>
              </div>
              <div class="path-bar-container" @click.away="showPathDropdown = false" style="margin-top: 0; margin-bottom: 12px;">
                <div class="path-input-wrapper">
                  <span class="material-symbols-rounded path-icon" style="font-size:16px;">folder_open</span>
                  <input type="text" x-model="pathInput" @focus="showPathDropdown = true; activeSuggestionIndex = -1" @keydown.down.prevent="navigateSuggestions(1)" @keydown.up.prevent="navigateSuggestions(-1)" @keydown.enter.prevent="selectSuggestionOrSubmit()" @keydown.escape="showPathDropdown = false" class="path-input" placeholder="跳转路径...">
                  <button @click="submitPath()" class="path-go-btn" title="跳转"><span class="material-symbols-rounded" style="font-size: 16px;">arrow_forward</span></button>
                </div>
              </div>
              
              <div class="file-actions" style="grid-template-columns: repeat(3, 1fr); gap: 8px;">
                <button @click="goParentDir()" style="background: var(--control-fill);">上级</button>
                <button @click="refreshFiles()" style="background: var(--control-fill);">刷新</button>
                <button @click="promptMkdir()" style="background: var(--control-fill);">新建目录</button>
                <button @click="promptWriteFile()" style="background: var(--control-fill);">新建文件</button>
                <button @click="pasteClipboard()" style="background: var(--control-fill);">粘贴</button>
                <button @click="triggerUpload()" style="background: var(--control-fill);">上传</button>
                <input type="file" x-ref="uploadInput" class="hidden" @change="handleFileUpload($event)">
              </div>
              
              <div class="file-list" style="margin-top: 12px; background: transparent;">
                <template x-if="!activeSessionId">
                  <div class="empty" style="padding-top: 40px;">连接 SSH 后显示远端文件。</div>
                </template>
                <template x-for="entry in files" :key="entry.filename">
                  <div class="file-item" @contextmenu="showContextMenu($event, entry)">
                    <button class="file-main" @click="entry.isDir ? openDir(entry.filename) : readFile(entry.filename)">
                      <span :class="getFileIconClass(entry)" style="background: transparent; color: var(--accent);">
                        <span class="material-symbols-rounded" x-text="getFileIcon(entry)" style="font-size: 20px;"></span>
                      </span>
                      <span>
                        <strong x-text="entry.filename"></strong>
                      </span>
                    </button>
                    <div class="file-tools" style="display:none;"></div>
                  </div>
                </template>
              </div>
            </div>
            
            <div x-show="rightTab === 'status'" style="display: flex; flex-direction: column; height: 100%;">
              <div class="panel-head" style="margin-bottom: 0;">
                <h2 style="font-size: 16px;">服务器状态</h2>
                <button x-show="!isMobile" @click="refreshFiles()" class="icon-btn"><span class="material-symbols-rounded" style="font-size: 16px;">refresh</span></button>
              </div>
              <template x-if="activeStatus">
                <div class="status-list" style="margin-top: 12px;">
                  <div class="status-info-row"><span>系统</span><strong x-text="activeStatus.osName || '-' "></strong></div>
                  <div class="status-info-row"><span>IP</span><strong x-text="activeStatus.serverIp || '-' "></strong></div>
                  <div class="status-grid">
                    <div class="status-circle" :class="(activeStatus.cpuPercent || 0) > 85 ? 'level-danger' : (activeStatus.cpuPercent || 0) > 60 ? 'level-warn' : 'level-ok'">
                      <svg viewBox="0 0 36 36"><path class="bg" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/><path class="fg" stroke-dasharray="100, 100" :stroke-dashoffset="100 - (activeStatus.cpuPercent || 0)" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/></svg>
                      <div class="inner">
                        <strong x-text="Math.round(activeStatus.cpuPercent || 0) + '%'"></strong>
                        <span>CPU</span>
                      </div>
                    </div>
                    <div class="status-circle" :class="(activeStatus.memPercent || 0) > 85 ? 'level-danger' : (activeStatus.memPercent || 0) > 60 ? 'level-warn' : 'level-ok'">
                      <svg viewBox="0 0 36 36"><path class="bg" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/><path class="fg" stroke-dasharray="100, 100" :stroke-dashoffset="100 - (activeStatus.memPercent || 0)" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/></svg>
                      <div class="inner">
                        <strong x-text="Math.round(activeStatus.memPercent || 0) + '%'"></strong>
                        <span>内存</span>
                      </div>
                    </div>
                    <div class="status-circle" :class="(activeStatus.diskPercent || 0) > 85 ? 'level-danger' : (activeStatus.diskPercent || 0) > 60 ? 'level-warn' : 'level-ok'">
                      <svg viewBox="0 0 36 36"><path class="bg" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/><path class="fg" stroke-dasharray="100, 100" :stroke-dashoffset="100 - (activeStatus.diskPercent || 0)" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/></svg>
                      <div class="inner">
                        <strong x-text="Math.round(activeStatus.diskPercent || 0) + '%'"></strong>
                        <span>磁盘</span>
                      </div>
                    </div>
                  </div>
                  <div class="status-info-row"><span><span class="material-symbols-rounded" style="font-size:16px;vertical-align:bottom;">download</span> 下行</span><strong x-text="bytes(activeStatus.netRxRate)"></strong></div>
                  <div class="status-info-row"><span><span class="material-symbols-rounded" style="font-size:16px;vertical-align:bottom;">upload</span> 上行</span><strong x-text="bytes(activeStatus.netTxRate)"></strong></div>
                </div>
              </template>
              <template x-if="!activeStatus">
                <div class="empty" style="padding-top: 40px;">暂无状态</div>
              </template>
            </div>

          </aside>

        </main>

        <div x-show="showConnectionManager" class="modal-backdrop" @click.self="closeConnectionManager()">
          <section class="connection-modal">
            <div class="modal-head">
              <h2 x-text="showConnectionForm ? (connectionForm.id ? '编辑连接' : '新增连接') : '连接管理'"></h2>
              <button @click="showConnectionForm ? showConnectionForm = false : closeConnectionManager()" class="icon-btn" style="border: none; background: transparent; padding: 4px;">
                <span class="material-symbols-rounded" x-text="showConnectionForm ? 'arrow_back' : 'close'"></span>
              </button>
            </div>
            <div class="connection-layout">
              <div class="manager-connection-list" x-show="!showConnectionForm">
                <div class="list-head">
                  <strong>已保存连接</strong>
                  <button @click="newConnection()" class="primary" style="padding: 6px 12px; border-radius: 20px;"><span class="material-symbols-rounded" style="font-size:18px;">add</span> 新增</button>
                </div>
                <template x-for="connection in connections" :key="connection.id">
                  <div class="manager-connection-card">
                    <div class="manager-card-main">
                      <div class="manager-card-icon" :class="(connection.type || 'SSH') === 'RDP' ? 'rdp' : 'ssh'">
                        <span class="material-symbols-rounded" x-text="(connection.type || 'SSH') === 'RDP' ? 'desktop_windows' : 'terminal'"></span>
                      </div>
                      <div class="manager-card-text">
                        <strong x-text="connection.name"></strong>
                        <small>
                          <span class="type-badge" x-text="connection.type || 'SSH'"></span>
                          <span x-text="connection.username + '@' + connection.host + ':' + connection.port"></span>
                        </small>
                        <p x-show="connection.notes" x-text="connection.notes"></p>
                      </div>
                    </div>
                    <div class="manager-card-actions">
                      <button class="primary" @click="openSession(connection); closeConnectionManager()"><span class="material-symbols-rounded" x-text="(connection.type || 'SSH') === 'RDP' ? 'desktop_windows' : 'login'"></span><span x-text="(connection.type || 'SSH') === 'RDP' ? '桌面' : '连接'"></span></button>
                      <button @click="testSavedConnection(connection.id)"><span class="material-symbols-rounded">network_check</span>测试</button>
                      <button @click="editConnection(connection)"><span class="material-symbols-rounded">edit</span>编辑</button>
                      <button class="danger-text icon-btn" @click="deleteConnection(connection.id)" title="删除"><span class="material-symbols-rounded" style="font-size:18px;">delete</span></button>
                    </div>
                  </div>
                </template>
                <div class="empty" x-show="!connections.length">暂无已保存的连接</div>
              </div>

              <form x-show="showConnectionForm" @submit.prevent="saveConnection()" class="connection-form">
                <input x-model="connectionForm.name" autocomplete="off" placeholder="名称" required>
                <select x-model="connectionForm.type" @change="normalizeConnectionForm()">
                  <option value="SSH">SSH 终端</option>
                  <option value="RDP">RDP 远程桌面</option>
                </select>
                <input x-model="connectionForm.host" autocomplete="url" placeholder="主机 (IP 或域名)" required>
                <input x-model.number="connectionForm.port" type="number" autocomplete="off" placeholder="端口" required>
                <input x-model="connectionForm.username" autocomplete="username" placeholder="用户名" required>
                <select x-show="connectionForm.type !== 'RDP'" x-model="connectionForm.auth_method">
                  <option value="password">密码</option>
                  <option value="key">私钥</option>
                </select>
                <template x-if="connectionForm.auth_method === 'password' || connectionForm.type === 'RDP'">
                  <input x-model="connectionForm.password" type="password" autocomplete="current-password" :placeholder="connectionForm.id ? '留空则保持原密码' : '密码'">
                </template>
                <template x-if="connectionForm.auth_method === 'key' && connectionForm.type !== 'RDP'">
                  <div class="form-stack">
                    <textarea x-model="connectionForm.private_key" placeholder="私钥，编辑时留空则保持原私钥"></textarea>
                    <input x-model="connectionForm.passphrase" type="password" autocomplete="current-password" placeholder="Passphrase，可留空">
                  </div>
                </template>
                <textarea x-model="connectionForm.notes" placeholder="备注"></textarea>
                <div class="form-actions">
                  <button class="primary" type="submit">保存</button>
                  <button type="button" @click="testConnection()">测试</button>
                  <button type="button" @click="showConnectionForm = false">取消</button>
                </div>
              </form>
            </div>
          </section>
        </div>

        <div x-show="testResultModal.visible" class="modal-backdrop test-result-backdrop">
          <div class="auth-card" style="max-width: 400px; text-align: center;">
            <h2 style="margin-top: 0;" x-text="testResultModal.title"></h2>
            <p x-text="testResultModal.message" :class="testResultModal.type"></p>
            <button class="primary" @click="testResultModal.visible = false" style="margin-top: 14px;">确定</button>
          </div>
        </div>

        <div x-show="activeEditorTab" class="editor-backdrop" :class="editorWindow.minimized ? 'is-minimized' : ''">
          <div class="editor-window" :class="{ maximized: editorWindow.maximized, minimized: editorWindow.minimized, resizing: editorWindow.resizing }" :style="editorWindowStyle()">
            <div class="editor-head" @pointerdown="startEditorDrag($event)" @dblclick="toggleEditorMaximize()">
              <div class="editor-title">
                <strong x-text="activeEditorTab?.name || ''"></strong>
                <small x-text="activeEditorTab?.path || ''"></small>
              </div>
              <div class="editor-actions">
                <button class="icon-btn" @click.stop="saveEditor()" title="保存"><span class="material-symbols-rounded">save</span></button>
                <button class="icon-btn" @click.stop="minimizeEditor()" title="最小化"><span class="material-symbols-rounded">minimize</span></button>
                <button class="icon-btn" @click.stop="toggleEditorMaximize()" :title="editorWindow.maximized ? '还原' : '最大化'"><span class="material-symbols-rounded" x-text="editorWindow.maximized ? 'filter_none' : 'crop_square'"></span></button>
                <button class="icon-btn" @click.stop="closeEditorTab(activeEditorTabId)" title="关闭"><span class="material-symbols-rounded">close</span></button>
              </div>
            </div>
            <template x-if="activeEditorTab">
              <div class="editor-body" x-show="!editorWindow.minimized">
                <textarea class="editor-textarea" :class="monacoReady ? 'hidden-editor' : ''" x-model="activeEditorTab.content"></textarea>
                <div id="monaco-editor-container" class="monaco-editor-container" :class="monacoReady ? '' : 'hidden-editor'" x-init="$nextTick(() => initMonacoEditor())" x-effect="updateMonacoEditor()"></div>
              </div>
            </template>
            <template x-if="!editorWindow.minimized && !editorWindow.maximized">
              <div class="editor-resize-handles">
                <span class="resize-handle n" @pointerdown.prevent="startEditorResize($event, 'n')"></span>
                <span class="resize-handle e" @pointerdown.prevent="startEditorResize($event, 'e')"></span>
                <span class="resize-handle s" @pointerdown.prevent="startEditorResize($event, 's')"></span>
                <span class="resize-handle w" @pointerdown.prevent="startEditorResize($event, 'w')"></span>
                <span class="resize-handle ne" @pointerdown.prevent="startEditorResize($event, 'ne')"></span>
                <span class="resize-handle nw" @pointerdown.prevent="startEditorResize($event, 'nw')"></span>
                <span class="resize-handle se" @pointerdown.prevent="startEditorResize($event, 'se')"></span>
                <span class="resize-handle sw" @pointerdown.prevent="startEditorResize($event, 'sw')"></span>
              </div>
            </template>
          </div>
        </div>

        <div x-show="contextMenu.visible" :style="`left:${contextMenu.x}px;top:${contextMenu.y}px`" class="context-menu" @click.stop>
          <button @click="copyEntry()">复制</button>
          <button @click="cutEntry()">剪切</button>
          <button @click="pasteClipboard()">粘贴</button>
          <button x-show="contextMenu.entry && !contextMenu.entry.isDir" @click="readFile(contextMenu.entry.filename); hideContextMenu()">编辑</button>
          <button x-show="contextMenu.entry && !contextMenu.entry.isDir" @click="downloadEntry(contextMenu.entry); hideContextMenu()">下载</button>
          <button class="danger-text" x-show="contextMenu.entry" @click="removeEntry(contextMenu.entry); hideContextMenu()">删除</button>
        </div>
      </div>
    </template>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search/lib/addon-search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script>window.module = window.module || { exports: {} };</script>
  <script src="https://cdn.jsdelivr.net/npm/guacamole-common-js@1.5.0/dist/cjs/guacamole-common.min.js"></script>
  <script>
    window.Guacamole = window.Guacamole || window.module.exports;
    if (window.module) { delete window.module; }
  </script>
  <script>
    (function() {
      const cdns = [
        { loader: 'https://lib.baomitu.com/monaco-editor/0.44.0/min/vs/loader.js', vs: 'https://lib.baomitu.com/monaco-editor/0.44.0/min/vs' },
        { loader: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.js', vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' },
        { loader: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js', vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' }
      ];
      function tryLoadMonaco(index) {
        if (index >= cdns.length) { return; }
        const cdn = cdns[index];
        const script = document.createElement('script');
        script.src = cdn.loader;
        let timeoutId = setTimeout(() => { script.onload = null; script.onerror = null; script.remove(); tryLoadMonaco(index + 1); }, 3000);
        script.onload = () => {
          clearTimeout(timeoutId);
          if (window.require) { window.require.config({ paths: { 'vs': cdn.vs } }); } else { tryLoadMonaco(index + 1); }
        };
        script.onerror = () => { clearTimeout(timeoutId); tryLoadMonaco(index + 1); };
        document.head.appendChild(script);
      }
      tryLoadMonaco(0);
    })();
  </script>
  <script src="/assets/js/app.js?v=20260611_winui_mobile"></script>
</body>
</html>
