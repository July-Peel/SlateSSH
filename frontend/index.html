<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SlateSSH Go</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/css/app.css?v=20260520">
</head>
<body>
  <div id="app" x-data="shadowApp()" x-init="init()" :class="theme === 'dark' ? 'app theme-dark' : 'app theme-light'">
    <template x-if="booting">
      <div class="auth-page">正在加载...</div>
    </template>

    <template x-if="!booting && needsSetup">
      <div class="auth-page">
        <form @submit.prevent="setup()" class="auth-card">
          <h1>初始化管理员</h1>
          <input x-model="setupForm.username" autocomplete="username" placeholder="用户名">
          <input x-model="setupForm.password" type="password" autocomplete="new-password" placeholder="密码">
          <input x-model="setupForm.confirmPassword" type="password" autocomplete="new-password" placeholder="确认密码">
          <p class="message error" x-text="error"></p>
          <button class="primary">初始化</button>
        </form>
      </div>
    </template>

    <template x-if="!booting && !needsSetup && !authenticated">
      <div class="auth-page">
        <form @submit.prevent="login()" class="auth-card">
          <h1>SlateSSH</h1>
          <input x-model="loginForm.username" autocomplete="username" placeholder="用户名">
          <input x-model="loginForm.password" type="password" autocomplete="current-password" placeholder="密码">
          <label class="check-row"><input type="checkbox" x-model="loginForm.rememberMe">记住我</label>
          <p class="message error" x-text="error"></p>
          <button class="primary">登录</button>
        </form>
      </div>
    </template>

    <template x-if="!booting && authenticated">
      <div class="workspace">
        <header class="topbar">
          <div class="brand">SlateSSH</div>
          <div class="spacer"></div>
          <span class="muted" x-text="currentUser?.username || ''" style="margin-right: 12px;"></span>
          <button @click="logout()" class="danger icon-btn" title="退出"><span class="material-symbols-rounded">logout</span></button>
        </header>

        <div class="fab-container" x-data="{ fabOpen: false }" @click.away="fabOpen = false">
          <div class="fab-menu" :class="fabOpen ? 'open' : ''">
            <button @click="showSftpWidget = !showSftpWidget; saveSettings(); if(isMobile) showMobileSftp = !showMobileSftp; fabOpen = false" class="fab-item" :title="showSftpWidget ? '隐藏文件面板' : '显示文件面板'">
              <span class="material-symbols-rounded" x-text="showSftpWidget ? 'folder_off' : 'folder'"></span>
              <span class="fab-label">文件</span>
            </button>
            <button @click="showStatusWidget = !showStatusWidget; saveSettings(); if(isMobile) showMobileStatus = !showMobileStatus; fabOpen = false" class="fab-item" :title="showStatusWidget ? '隐藏状态面板' : '显示状态面板'">
              <span class="material-symbols-rounded" x-text="showStatusWidget ? 'monitoring' : 'speed'"></span>
              <span class="fab-label">状态</span>
            </button>
            <button @click="toggleTheme(); fabOpen = false" class="fab-item" :title="theme === 'dark' ? '白天模式' : '夜间模式'">
              <span class="material-symbols-rounded" x-text="theme === 'dark' ? 'light_mode' : 'dark_mode'"></span>
              <span class="fab-label" x-text="theme === 'dark' ? '白间' : '夜间'"></span>
            </button>
            <button @click="clearActiveTerminal(); fabOpen = false" class="fab-item" title="清空终端">
              <span class="material-symbols-rounded">mop</span>
              <span class="fab-label">清空</span>
            </button>
            <button @click="refreshFiles(); fabOpen = false" class="fab-item" title="刷新 SFTP">
              <span class="material-symbols-rounded">refresh</span>
              <span class="fab-label">刷新</span>
            </button>
            <button @click="openConnectionManager(); fabOpen = false" class="fab-item" title="连接管理">
              <span class="material-symbols-rounded">dns</span>
              <span class="fab-label">连接</span>
            </button>
          </div>
          <button class="fab-main" @click="fabOpen = !fabOpen" :class="fabOpen ? 'open' : ''">
            <span class="material-symbols-rounded">apps</span>
          </button>
        </div>

        <div class="drawer-overlay" x-show="isMobile && (showMobileSftp || showMobileStatus)" @click="showMobileSftp = false; showMobileStatus = false"></div>

        <main class="main-grid" :class="{ 'no-status': !showStatusWidget, 'no-sftp': !showSftpWidget }">
          <aside class="file-panel" x-show="!isMobile ? showSftpWidget : true" :class="isMobile ? (showMobileSftp ? 'mobile-drawer left open' : 'mobile-drawer left') : ''">
            <div class="panel-head">
              <div>
                <h2>SFTP 文件</h2>
                <p class="path" x-text="activePath"></p>
              </div>
              <button x-show="isMobile" @click="showMobileSftp = false">×</button>
            </div>
            <div class="file-actions">
              <button @click="goParentDir()">上级</button>
              <button @click="refreshFiles()">刷新</button>
              <button @click="promptMkdir()">新建目录</button>
              <button @click="promptWriteFile()">新建文件</button>
              <button @click="pasteClipboard()">粘贴</button>
              <button @click="triggerUpload()">上传</button>
              <input type="file" x-ref="uploadInput" class="hidden" @change="handleFileUpload($event)">
            </div>
            <div class="crumbs">
              <template x-for="(segment, index) in pathSegments" :key="segment.fullPath">
                <span>
                  <button @click="jumpToPath(segment.fullPath)" x-text="segment.label"></button>
                  <span x-show="index < pathSegments.length - 1">/</span>
                </span>
              </template>
            </div>
            <div class="file-list">
              <template x-if="!activeSessionId">
                <div class="empty">连接 SSH 后显示远端文件。</div>
              </template>
              <template x-for="entry in files" :key="entry.filename">
                <div class="file-item" @contextmenu="showContextMenu($event, entry)">
                  <button class="file-main" @click="entry.isDir ? openDir(entry.filename) : readFile(entry.filename)">
                    <span class="file-icon" x-text="entry.isDir ? 'DIR' : 'TXT'"></span>
                    <span>
                      <strong x-text="entry.filename"></strong>
                      <small x-text="(entry.isDir ? '文件夹' : formatSize(entry.size)) + ' · ' + formatUnix(entry.mtime)"></small>
                    </span>
                  </button>
                  <div class="file-tools">
                    <button x-show="!entry.isDir" @click="readFile(entry.filename)">编辑</button>
                    <button @click="renameEntry(entry)">改名</button>
                    <button @click="copyEntry(entry)">复制</button>
                    <button @click="cutEntry(entry)">剪切</button>
                    <button x-show="!entry.isDir" @click="downloadEntry(entry)">下载</button>
                    <button class="danger-text" @click="removeEntry(entry)">删除</button>
                  </div>
                </div>
              </template>
            </div>
          </aside>

          <section class="terminal-panel">
            <div class="tabbar">
              <template x-for="tab in sessions" :key="tab.id">
                <button @click="activateSession(tab.id)" class="tab" :class="activeSessionId === tab.id ? 'active' : ''">
                  <span x-text="tab.name"></span>
                  <small x-text="tab.connected ? '在线' : '断开'"></small>
                  <span @click.stop="closeTab(tab.id)">×</span>
                </button>
              </template>
              <div class="tab-empty" x-show="!sessions.length">暂无活动会话</div>
            </div>

            <div class="terminal-tools" x-show="activeSessionId">
              <template x-if="activeSessionType() !== 'RDP'">
                <div style="display:contents;">
                  <input x-model="terminalSearch" @keydown.enter.prevent="searchTerminal()" placeholder="搜索终端输出">
                  <button @click="searchTerminal()">搜索</button>
                  <button @click="findNextTerminalResult()">下一个</button>
                  <button @click="copyTerminalSelection()">复制选中</button>
                </div>
              </template>
              <div class="spacer"></div>
              <button @click="toggleFullscreen()">网页全屏</button>
            </div>

            <div class="terminal-stage" :class="isFullscreen ? 'fullscreen' : ''">
              <button x-show="isFullscreen" @click="toggleFullscreen()" class="close-fullscreen-btn">退出全屏</button>
              <template x-for="tab in sessions" :key="tab.id + '-terminal'">
                <div x-show="activeSessionId === tab.id" class="terminal-wrap">
                  <template x-if="tab.type === 'RDP'">
                    <div class="rdp-surface" :id="'rdp-' + tab.id"></div>
                  </template>
                  <template x-if="tab.type !== 'RDP'">
                    <div :id="'terminal-' + tab.id" class="terminal-surface"></div>
                  </template>
                </div>
              </template>
              <template x-if="!sessions.length">
                <div class="terminal-empty">从“连接管理”选择一个 SSH 或 RDP 连接开始。</div>
              </template>
            </div>

            <div class="mobile-keyboard" x-show="isMobile && activeSessionType() !== 'RDP'" style="display: none;">
              <button @click="ctrlKeyActive = !ctrlKeyActive" :style="ctrlKeyActive ? 'background: var(--accent); color: #fff; border-color: var(--accent);' : ''">Ctrl</button>
              <button @click="sendQuick('\x1b')">Esc</button>
              <button @click="sendQuick('\x09')">Tab</button>
              <button @click="sendQuick('\x1b[A')">↑</button>
              <button @click="sendQuick('\x1b[B')">↓</button>
              <button @click="sendQuick('\x1b[D')">←</button>
              <button @click="sendQuick('\x1b[C')">→</button>
              <button @click="sendQuick('|')">|</button>
              <button @click="sendQuick('/')">/</button>
            </div>

            <div class="commandbar" x-show="!activeSessionId || activeSessionType() !== 'RDP'">
              <button @click="sendQuick('')" x-show="!isMobile">Ctrl+C</button>
              <button @click="sendQuick('clear')" x-show="!isMobile">clear</button>
              <button @click="sendQuick('exit')" x-show="!isMobile">exit</button>
              <input x-model="commandInput" @keydown.enter.prevent="sendCommandInput()" placeholder="输入命令后按 Enter 发送">
              <button @click="sendCommandInput()" class="primary">发送</button>
            </div>
            <p class="status-line" :class="testMessageType" x-text="testMessage"></p>
          </section>

          <aside class="status-panel" x-show="!isMobile ? showStatusWidget : true" :class="isMobile ? (showMobileStatus ? 'mobile-drawer right open' : 'mobile-drawer right') : ''">
            <div class="panel-head">
              <h2>服务器状态</h2>
              <button x-show="!isMobile" @click="refreshFiles()">刷新</button>
              <button x-show="isMobile" @click="showMobileStatus = false">×</button>
            </div>
            <template x-if="activeStatus">
              <div class="status-list">
                <div class="status-info-row"><span>系统</span><strong x-text="activeStatus.osName || '-' "></strong></div>
                <div class="status-info-row"><span>IP</span><strong x-text="activeStatus.serverIp || '-' "></strong></div>
                <div class="status-grid">
                  <div class="status-circle">
                    <svg viewBox="0 0 36 36"><path class="bg" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/><path class="fg" stroke-dasharray="100, 100" :stroke-dashoffset="100 - (activeStatus.cpuPercent || 0)" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/></svg>
                    <div class="inner">
                      <strong x-text="Math.round(activeStatus.cpuPercent || 0) + '%'"></strong>
                      <span>CPU</span>
                    </div>
                  </div>
                  <div class="status-circle">
                    <svg viewBox="0 0 36 36"><path class="bg" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/><path class="fg" stroke-dasharray="100, 100" :stroke-dashoffset="100 - (activeStatus.memPercent || 0)" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/></svg>
                    <div class="inner">
                      <strong x-text="Math.round(activeStatus.memPercent || 0) + '%'"></strong>
                      <span>内存</span>
                    </div>
                  </div>
                  <div class="status-circle">
                    <svg viewBox="0 0 36 36"><path class="bg" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/><path class="fg" stroke-dasharray="100, 100" :stroke-dashoffset="100 - (activeStatus.diskPercent || 0)" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/></svg>
                    <div class="inner">
                      <strong x-text="Math.round(activeStatus.diskPercent || 0) + '%'"></strong>
                      <span>磁盘</span>
                    </div>
                  </div>
                </div>
                <div class="status-info-row"><span><span class="material-symbols-rounded" style="font-size:16px;vertical-align:bottom;">download</span> 下行</span><strong x-text="bytes(activeStatus.netRxRate) + '/s'"></strong></div>
                <div class="status-info-row"><span><span class="material-symbols-rounded" style="font-size:16px;vertical-align:bottom;">upload</span> 上行</span><strong x-text="bytes(activeStatus.netTxRate) + '/s'"></strong></div>
              </div>
            </template>
            <template x-if="!activeStatus">
              <div class="empty">暂无状态</div>
            </template>
          </aside>
        </main>

        <div x-show="showConnectionManager" class="modal-backdrop" @click.self="closeConnectionManager()">
          <section class="connection-modal">
            <div class="modal-head">
              <h2 x-text="showConnectionForm ? (connectionForm.id ? '编辑连接' : '新增连接') : '连接管理'"></h2>
              <button @click="showConnectionForm ? showConnectionForm = false : closeConnectionManager()" class="icon-btn" style="border: none; background: transparent; padding: 4px;">
                <span class="material-symbols-rounded" x-text="showConnectionForm ? 'arrow_back' : 'close'"></span>
              </button>
            </div>
            <div class="connection-layout">
              <div class="connection-list" x-show="!showConnectionForm">
                <div class="list-head">
                  <strong>已保存连接</strong>
                  <button @click="newConnection()" class="primary" style="padding: 6px 12px; border-radius: 20px;"><span class="material-symbols-rounded" style="font-size:18px;">add</span> 新增</button>
                </div>
                <template x-for="connection in connections" :key="connection.id">
                  <div class="connection-item">
                    <div>
                      <strong x-text="connection.name"></strong>
                      <small><span class="type-badge" x-text="connection.type || 'SSH'"></span><span x-text="' ' + connection.username + '@' + connection.host + ':' + connection.port"></span></small>
                    </div>
                    <div class="connection-actions">
                      <button @click="openSession(connection); closeConnectionManager()" x-text="(connection.type || 'SSH') === 'RDP' ? '桌面' : '连接'"></button>
                      <button @click="testSavedConnection(connection.id)">测试</button>
                      <button @click="editConnection(connection)">编辑</button>
                      <button class="danger-text icon-btn" @click="deleteConnection(connection.id)" title="删除"><span class="material-symbols-rounded" style="font-size:18px;">delete</span></button>
                    </div>
                  </div>
                </template>
                <div class="empty" x-show="!connections.length">暂无已保存的连接</div>
              </div>

              <form x-show="showConnectionForm" @submit.prevent="saveConnection()" class="connection-form">
                <input x-model="connectionForm.name" autocomplete="off" placeholder="名称" required>
                <select x-model="connectionForm.type" @change="normalizeConnectionForm()">
                  <option value="SSH">SSH 终端</option>
                  <option value="RDP">RDP 远程桌面</option>
                </select>
                <input x-model="connectionForm.host" autocomplete="url" placeholder="主机 (IP 或域名)" required>
                <input x-model.number="connectionForm.port" type="number" autocomplete="off" placeholder="端口" required>
                <input x-model="connectionForm.username" autocomplete="username" placeholder="用户名" required>
                <select x-show="connectionForm.type !== 'RDP'" x-model="connectionForm.auth_method">
                  <option value="password">密码</option>
                  <option value="key">私钥</option>
                </select>
                <template x-if="connectionForm.auth_method === 'password' || connectionForm.type === 'RDP'">
                  <input x-model="connectionForm.password" type="password" autocomplete="current-password" :placeholder="connectionForm.id ? '留空则保持原密码' : '密码'">
                </template>
                <template x-if="connectionForm.auth_method === 'key' && connectionForm.type !== 'RDP'">
                  <div class="form-stack">
                    <textarea x-model="connectionForm.private_key" placeholder="私钥，编辑时留空则保持原私钥"></textarea>
                    <input x-model="connectionForm.passphrase" type="password" autocomplete="current-password" placeholder="Passphrase，可留空">
                  </div>
                </template>
                <textarea x-model="connectionForm.notes" placeholder="备注"></textarea>
                <div class="form-actions">
                  <button class="primary" type="submit">保存</button>
                  <button type="button" @click="testConnection()">测试</button>
                  <button type="button" @click="showConnectionForm = false">取消</button>
                </div>
              </form>
            </div>
          </section>
        </div>

        <div x-show="testResultModal.visible" class="modal-backdrop" style="z-index: 100;">
          <div class="auth-card" style="max-width: 400px; text-align: center;">
            <h2 style="margin-top: 0;" x-text="testResultModal.title"></h2>
            <p x-text="testResultModal.message" :class="testResultModal.type"></p>
            <button class="primary" @click="testResultModal.visible = false" style="margin-top: 14px;">确定</button>
          </div>
        </div>

        <div x-show="activeEditorTab" class="editor-window" :style="`left:${editorWindow.x}px;top:${editorWindow.y}px;width:${editorWindow.width}px;height:${editorWindow.height}px`">
          <div class="editor-head" @mousedown="startEditorDrag($event)">
            <div>
              <strong x-text="activeEditorTab?.name || ''"></strong>
              <small x-text="activeEditorTab?.path || ''"></small>
            </div>
            <div>
              <button @click="saveEditor()">保存</button>
              <button @click="closeEditorTab(activeEditorTabId)">关闭</button>
            </div>
          </div>
          <template x-if="activeEditorTab">
            <div class="editor-body">
              <textarea class="editor-textarea" :class="monacoReady ? 'hidden-editor' : ''" x-model="activeEditorTab.content"></textarea>
              <div id="monaco-editor-container" class="monaco-editor-container" :class="monacoReady ? '' : 'hidden-editor'" x-init="$nextTick(() => initMonacoEditor())" x-effect="updateMonacoEditor()"></div>
            </div>
          </template>
        </div>

        <div x-show="contextMenu.visible" :style="`left:${contextMenu.x}px;top:${contextMenu.y}px`" class="context-menu" @click.stop>
          <button @click="copyEntry()">复制</button>
          <button @click="cutEntry()">剪切</button>
          <button @click="pasteClipboard()">粘贴</button>
          <button x-show="contextMenu.entry && !contextMenu.entry.isDir" @click="readFile(contextMenu.entry.filename); hideContextMenu()">编辑</button>
          <button x-show="contextMenu.entry && !contextMenu.entry.isDir" @click="downloadEntry(contextMenu.entry); hideContextMenu()">下载</button>
          <button class="danger-text" x-show="contextMenu.entry" @click="removeEntry(contextMenu.entry); hideContextMenu()">删除</button>
        </div>
      </div>
    </template>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search/lib/addon-search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script>window.module = window.module || { exports: {} };</script>
  <script src="https://cdn.jsdelivr.net/npm/guacamole-common-js@1.5.0/dist/cjs/guacamole-common.min.js"></script>
  <script>window.Guacamole = window.Guacamole || window.module.exports;</script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
  <script>
    if (window.require) {
      window.require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } });
    }
  </script>
  <script src="/assets/js/app.js?v=20260514f"></script>
</body>
</html>
