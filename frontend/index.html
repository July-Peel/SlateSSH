<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SlateSSH Go</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm/css/xterm.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/css/app.css?v=20260512c">
</head>
<body>
  <div id="app" x-data="shadowApp()" x-init="init()" :class="theme === 'dark' ? 'app theme-dark' : 'app theme-light'">
    <template x-if="booting">
      <div class="auth-page">正在加载...</div>
    </template>

    <template x-if="!booting && needsSetup">
      <div class="auth-page">
        <form @submit.prevent="setup()" class="auth-card">
          <h1>初始化管理员</h1>
          <input x-model="setupForm.username" autocomplete="username" placeholder="用户名">
          <input x-model="setupForm.password" type="password" autocomplete="new-password" placeholder="密码">
          <input x-model="setupForm.confirmPassword" type="password" autocomplete="new-password" placeholder="确认密码">
          <p class="message error" x-text="error"></p>
          <button class="primary">初始化</button>
        </form>
      </div>
    </template>

    <template x-if="!booting && !needsSetup && !authenticated">
      <div class="auth-page">
        <form @submit.prevent="login()" class="auth-card">
          <h1>SlateSSH</h1>
          <input x-model="loginForm.username" autocomplete="username" placeholder="用户名">
          <input x-model="loginForm.password" type="password" autocomplete="current-password" placeholder="密码">
          <label class="check-row"><input type="checkbox" x-model="loginForm.rememberMe">记住我</label>
          <p class="message error" x-text="error"></p>
          <button class="primary">登录</button>
        </form>
      </div>
    </template>

    <template x-if="!booting && authenticated">
      <div class="workspace">
        <header class="mobile-header" x-show="isMobile" style="display: none;">
          <button @click="showMobileMenu = !showMobileMenu" class="toolbar-btn">☰ 菜单</button>
          <div class="brand" style="margin:0; font-size: 16px;">SlateSSH</div>
          <div style="display:flex;gap:6px;">
            <button @click="showMobileSftp = !showMobileSftp" class="toolbar-btn">文件</button>
            <button @click="showMobileStatus = !showMobileStatus" class="toolbar-btn">状态</button>
          </div>
        </header>

        <header class="topbar" :class="isMobile ? (showMobileMenu ? 'mobile-drawer left open' : 'mobile-drawer left') : ''">
          <div class="brand" x-show="!isMobile">SlateSSH</div>
          <button x-show="isMobile" class="toolbar-btn" style="align-self: flex-end; margin-bottom: 10px;" @click="showMobileMenu = false">关闭菜单</button>
          <button @click="openConnectionManager(); if(isMobile) showMobileMenu = false" class="toolbar-btn">连接管理</button>
          <button @click="refreshFiles()" class="toolbar-btn">刷新 SFTP</button>
          <button @click="clearActiveTerminal()" class="toolbar-btn">清空终端</button>
          <button @click="toggleTheme()" class="toolbar-btn" x-text="theme === 'dark' ? '白天模式' : '夜间模式'"></button>
          <button @click="showStatusWidget = !showStatusWidget; saveSettings()" class="toolbar-btn" x-show="!isMobile" x-text="showStatusWidget ? '隐藏状态' : '显示状态'"></button>
          <div class="spacer" x-show="!isMobile"></div>
          <span class="muted" x-text="currentUser?.username || ''" style="margin-top: auto; padding-top: 20px;"></span>
          <button @click="logout()" class="danger">退出</button>
        </header>

        <div class="drawer-overlay" x-show="isMobile && (showMobileMenu || showMobileSftp || showMobileStatus)" @click="showMobileMenu = false; showMobileSftp = false; showMobileStatus = false"></div>

        <main class="main-grid" :class="showStatusWidget ? '' : 'no-status'">
          <aside class="file-panel" :class="isMobile ? (showMobileSftp ? 'mobile-drawer left open' : 'mobile-drawer left') : ''">
            <div class="panel-head">
              <div>
                <h2>SFTP 文件</h2>
                <p class="path" x-text="activePath"></p>
              </div>
              <button x-show="isMobile" @click="showMobileSftp = false">×</button>
            </div>
            <div class="file-actions">
              <button @click="goParentDir()">上级</button>
              <button @click="refreshFiles()">刷新</button>
              <button @click="promptMkdir()">新建目录</button>
              <button @click="promptWriteFile()">新建文件</button>
              <button @click="pasteClipboard()">粘贴</button>
              <button @click="triggerUpload()">上传</button>
              <input type="file" x-ref="uploadInput" class="hidden" @change="handleFileUpload($event)">
            </div>
            <div class="crumbs">
              <template x-for="(segment, index) in pathSegments" :key="segment.fullPath">
                <span>
                  <button @click="jumpToPath(segment.fullPath)" x-text="segment.label"></button>
                  <span x-show="index < pathSegments.length - 1">/</span>
                </span>
              </template>
            </div>
            <div class="file-list">
              <template x-if="!activeSessionId">
                <div class="empty">连接 SSH 后显示远端文件。</div>
              </template>
              <template x-for="entry in files" :key="entry.filename">
                <div class="file-item" @contextmenu="showContextMenu($event, entry)">
                  <button class="file-main" @click="entry.isDir ? openDir(entry.filename) : readFile(entry.filename)">
                    <span class="file-icon" x-text="entry.isDir ? 'DIR' : 'TXT'"></span>
                    <span>
                      <strong x-text="entry.filename"></strong>
                      <small x-text="(entry.isDir ? '文件夹' : formatSize(entry.size)) + ' · ' + formatUnix(entry.mtime)"></small>
                    </span>
                  </button>
                  <div class="file-tools">
                    <button x-show="!entry.isDir" @click="readFile(entry.filename)">编辑</button>
                    <button @click="renameEntry(entry)">改名</button>
                    <button @click="copyEntry(entry)">复制</button>
                    <button @click="cutEntry(entry)">剪切</button>
                    <button x-show="!entry.isDir" @click="downloadEntry(entry)">下载</button>
                    <button class="danger-text" @click="removeEntry(entry)">删除</button>
                  </div>
                </div>
              </template>
            </div>
          </aside>

          <section class="terminal-panel">
            <div class="tabbar">
              <template x-for="tab in sessions" :key="tab.id">
                <button @click="activateSession(tab.id)" class="tab" :class="activeSessionId === tab.id ? 'active' : ''">
                  <span x-text="tab.name"></span>
                  <small x-text="tab.connected ? '在线' : '断开'"></small>
                  <span @click.stop="closeTab(tab.id)">×</span>
                </button>
              </template>
              <div class="tab-empty" x-show="!sessions.length">暂无活动会话</div>
            </div>

            <div class="terminal-tools">
              <input x-model="terminalSearch" @keydown.enter.prevent="searchTerminal()" placeholder="搜索终端输出">
              <button @click="searchTerminal()">搜索</button>
              <button @click="findNextTerminalResult()">下一个</button>
              <button @click="copyTerminalSelection()">复制选中</button>
            </div>

            <div class="terminal-stage">
              <template x-for="tab in sessions" :key="tab.id + '-terminal'">
                <div x-show="activeSessionId === tab.id" class="terminal-wrap">
                  <div :id="'terminal-' + tab.id" class="terminal-surface"></div>
                </div>
              </template>
              <template x-if="!sessions.length">
                <div class="terminal-empty">从“连接管理”选择一个 SSH 连接开始。</div>
              </template>
            </div>

            <div class="mobile-keyboard" x-show="isMobile" style="display: none;">
              <button @click="ctrlKeyActive = !ctrlKeyActive" :style="ctrlKeyActive ? 'background: var(--accent); color: #fff; border-color: var(--accent);' : ''">Ctrl</button>
              <button @click="sendQuick('\x1b')">Esc</button>
              <button @click="sendQuick('\x09')">Tab</button>
              <button @click="sendQuick('\x1b[A')">↑</button>
              <button @click="sendQuick('\x1b[B')">↓</button>
              <button @click="sendQuick('\x1b[D')">←</button>
              <button @click="sendQuick('\x1b[C')">→</button>
              <button @click="sendQuick('|')">|</button>
              <button @click="sendQuick('/')">/</button>
            </div>

            <div class="commandbar">
              <button @click="sendQuick('')" x-show="!isMobile">Ctrl+C</button>
              <button @click="sendQuick('clear')" x-show="!isMobile">clear</button>
              <button @click="sendQuick('exit')" x-show="!isMobile">exit</button>
              <input x-model="commandInput" @keydown.enter.prevent="sendCommandInput()" placeholder="输入命令后按 Enter 发送">
              <button @click="sendCommandInput()" class="primary">发送</button>
            </div>
            <p class="status-line" :class="testMessageType" x-text="testMessage"></p>
          </section>

          <aside class="status-panel" x-show="!isMobile ? showStatusWidget : true" :class="isMobile ? (showMobileStatus ? 'mobile-drawer right open' : 'mobile-drawer right') : ''">
            <div class="panel-head">
              <h2>服务器状态</h2>
              <button x-show="!isMobile" @click="refreshFiles()">刷新</button>
              <button x-show="isMobile" @click="showMobileStatus = false">×</button>
            </div>
            <template x-if="activeStatus">
              <div class="status-list">
                <div><span>系统</span><strong x-text="activeStatus.osName || '-' "></strong></div>
                <div><span>IP</span><strong x-text="activeStatus.serverIp || '-' "></strong></div>
                <div><span>CPU</span><strong x-text="percent(activeStatus.cpuPercent)"></strong></div>
                <div><span>内存</span><strong x-text="percent(activeStatus.memPercent)"></strong></div>
                <div><span>磁盘</span><strong x-text="percent(activeStatus.diskPercent)"></strong></div>
                <div><span>下行</span><strong x-text="bytes(activeStatus.netRxRate)"></strong></div>
                <div><span>上行</span><strong x-text="bytes(activeStatus.netTxRate)"></strong></div>
              </div>
            </template>
            <template x-if="!activeStatus">
              <div class="empty">暂无状态</div>
            </template>
          </aside>
        </main>

        <div x-show="showConnectionManager" class="modal-backdrop" @click.self="closeConnectionManager()">
          <section class="connection-modal">
            <div class="modal-head">
              <h2>连接管理</h2>
              <button @click="closeConnectionManager()">×</button>
            </div>
            <div class="connection-layout">
              <div class="connection-list">
                <div class="list-head">
                  <strong>已保存连接</strong>
                  <button @click="newConnection()">新增</button>
                </div>
                <template x-for="connection in connections" :key="connection.id">
                  <div class="connection-item">
                    <div>
                      <strong x-text="connection.name"></strong>
                      <small x-text="connection.username + '@' + connection.host + ':' + connection.port"></small>
                    </div>
                    <div class="connection-actions">
                      <button @click="openSession(connection); closeConnectionManager()">连接</button>
                      <button @click="testSavedConnection(connection.id)">测试</button>
                      <button @click="editConnection(connection)">编辑</button>
                      <button class="danger-text" @click="deleteConnection(connection.id)">删</button>
                    </div>
                  </div>
                </template>
              </div>

              <form x-show="showConnectionForm" @submit.prevent="saveConnection()" class="connection-form">
                <h3 x-text="connectionForm.id ? '编辑连接' : '新增连接'"></h3>
                <input x-model="connectionForm.name" autocomplete="off" placeholder="名称">
                <input x-model="connectionForm.host" autocomplete="url" placeholder="主机">
                <input x-model.number="connectionForm.port" type="number" autocomplete="off" placeholder="端口">
                <input x-model="connectionForm.username" autocomplete="username" placeholder="用户名">
                <select x-model="connectionForm.auth_method">
                  <option value="password">密码</option>
                  <option value="key">私钥</option>
                </select>
                <template x-if="connectionForm.auth_method === 'password'">
                  <input x-model="connectionForm.password" type="password" autocomplete="current-password" :placeholder="connectionForm.id ? '留空则保持原密码' : '密码'">
                </template>
                <template x-if="connectionForm.auth_method === 'key'">
                  <div class="form-stack">
                    <textarea x-model="connectionForm.private_key" placeholder="私钥，编辑时留空则保持原私钥"></textarea>
                    <input x-model="connectionForm.passphrase" type="password" autocomplete="current-password" placeholder="Passphrase，可留空">
                  </div>
                </template>
                <textarea x-model="connectionForm.notes" placeholder="备注"></textarea>
                <div class="form-actions">
                  <button class="primary">保存</button>
                  <button type="button" @click="testConnection()">测试当前信息</button>
                </div>
              </form>
            </div>
          </section>
        </div>

        <div x-show="testResultModal.visible" class="modal-backdrop" style="z-index: 100;">
          <div class="auth-card" style="max-width: 400px; text-align: center;">
            <h2 style="margin-top: 0;" x-text="testResultModal.title"></h2>
            <p x-text="testResultModal.message" :class="testResultModal.type"></p>
            <button class="primary" @click="testResultModal.visible = false" style="margin-top: 14px;">确定</button>
          </div>
        </div>

        <div x-show="activeEditorTab" class="editor-window" :style="`left:${editorWindow.x}px;top:${editorWindow.y}px;width:${editorWindow.width}px;height:${editorWindow.height}px`">
          <div class="editor-head" @mousedown="startEditorDrag($event)">
            <div>
              <strong x-text="activeEditorTab?.name || ''"></strong>
              <small x-text="activeEditorTab?.path || ''"></small>
            </div>
            <div>
              <button @click="saveEditor()">保存</button>
              <button @click="closeEditorTab(activeEditorTabId)">关闭</button>
            </div>
          </div>
          <template x-if="activeEditorTab">
            <div id="monaco-editor-container" class="editor-body" style="height: 100%; width: 100%;" x-init="$nextTick(() => initMonacoEditor())" x-effect="updateMonacoEditor()"></div>
          </template>
        </div>

        <div x-show="contextMenu.visible" :style="`left:${contextMenu.x}px;top:${contextMenu.y}px`" class="context-menu" @click.stop>
          <button @click="copyEntry()">复制</button>
          <button @click="cutEntry()">剪切</button>
          <button @click="pasteClipboard()">粘贴</button>
          <button x-show="contextMenu.entry && !contextMenu.entry.isDir" @click="readFile(contextMenu.entry.filename); hideContextMenu()">编辑</button>
          <button x-show="contextMenu.entry && !contextMenu.entry.isDir" @click="downloadEntry(contextMenu.entry); hideContextMenu()">下载</button>
          <button class="danger-text" x-show="contextMenu.entry" @click="removeEntry(contextMenu.entry); hideContextMenu()">删除</button>
        </div>
      </div>
    </template>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search/lib/addon-search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
  <script>
    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } });
  </script>
  <script src="/assets/js/app.js?v=20260512c"></script>
</body>
</html>
